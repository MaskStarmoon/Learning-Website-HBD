<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💕 Untuk Sayang 💕</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
touch-action:manipulation;
-webkit-tap-highlight-color:transparent;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#60a5fa,
#ffffff
);
position:relative;
}
    
.progress-wrapper{
touch-action:manipulation;
user-select:none;
-webkit-user-select:none;
}

.container{
position:relative;
z-index:5;
width:90%;
max-width:500px;
padding:25px;
text-align:center;
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
border-radius:30px;
border:2px solid rgba(255,255,255,.2);
box-shadow:
0 0 30px rgba(96,165,250,.5);
}

.title{
font-size:28px;
color:white;
font-weight:bold;
margin-bottom:20px;
text-shadow:
0 0 15px #60a5fa,
0 0 30px #93c5fd;
}

.progress-wrapper{
display:flex;
justify-content:center;
margin-bottom:20px;
cursor:pointer;
}

svg{
filter:
drop-shadow(0 0 20px #60a5fa)
drop-shadow(0 0 40px #93c5fd);
}

#percentText{
fill:white;
font-size:42px;
font-weight:bold;
}

.card{
padding:20px;
border-radius:25px;
background:rgba(255,255,255,.15);
min-height:220px;
max-height:85vh;
overflow-y:auto;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:.6s;
}

.fade-out{
opacity:0;
transform:translateY(20px);
}

.fade-in{
opacity:1;
transform:translateY(0px);
}

.gif{
width:180px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 0 20px rgba(96,165,250,.8);
}

.message{
font-size:20px;
color:white;
font-weight:600;
line-height:1.6;
}

.nextBtn{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:999px;
cursor:pointer;
font-size:18px;
font-weight:bold;
color:white;
background:
linear-gradient(
90deg,
#2563eb,
#60a5fa
);
box-shadow:
0 0 15px #60a5fa,
0 0 30px #60a5fa,
0 0 50px #93c5fd;
transition:.3s;
}

.nextBtn:hover{
transform:scale(1.05);
}
    
.nextBtn:disabled{

opacity:.5;
cursor:not-allowed;

}

.hidden{
display:none;
}

.heart{
position:absolute;
animation:floatHeart 6s linear forwards;
pointer-events:none;
}

@keyframes floatHeart{
0%{
opacity:0;
transform:translateY(0) scale(.5);
}
20%{
opacity:1;
}
100%{
opacity:0;
transform:translateY(-700px) scale(1.8);
}
}

.balloon{
position:absolute;
bottom:-200px;
font-size:50px;
animation:balloon 12s linear infinite;
}

@keyframes balloon{
from{
transform:translateY(0);
}
to{
transform:translateY(-130vh);
}
}

.confetti{
position:absolute;
font-size:24px;
animation:confetti 4s linear forwards;
}

@keyframes confetti{
0%{
opacity:1;
}
100%{
opacity:0;
transform:
translateY(700px)
rotate(720deg);
}
}

.sparkle{
position:absolute;
animation:sparkle 2s linear infinite;
}

@keyframes sparkle{
50%{
transform:scale(1.6);
}
}

.finalMessage{
font-size:28px;
color:white;
font-weight:bold;
text-align:center;
line-height:1.5;
word-wrap:break-word;
overflow-wrap:break-word;
max-width:100%;

text-shadow:
0 0 10px white,
0 0 25px #60a5fa,
0 0 50px #93c5fd;
}

.tapText{
margin-bottom:15px;
color:white;
font-size:14px;
}
    
.memoryImage{
width:100%;
border-radius:20px;
max-height:350px;
object-fit:contain;
background:
rgba(255,255,255,.05);
}

</style>
</head>
<body>
<div class="container">

<div class="title">
🤍 Birthday Love 🤍
</div>

<div id="loveSection">

<div class="tapText">
Tap hati sampai 100% ❤️
</div>

<div class="progress-wrapper" id="heartTap">

<svg width="200" height="180" viewBox="0 0 512 512">

<defs>
<clipPath id="heartClip">
<path d="M256 464s-32-24-64-52C96 336 32 272 32 176 32 96 96 48 160 48c40 0 72 24 96 56 24-32 56-56 96-56 64 0 128 48 128 128 0 96-64 160-160 236-32 28-64 52-64 52z"/>
</clipPath>
</defs>

<path
fill="rgba(255,255,255,.2)"
d="M256 464s-32-24-64-52C96 336 32 272 32 176 32 96 96 48 160 48c40 0 72 24 96 56 24-32 56-56 96-56 64 0 128 48 128 128 0 96-64 160-160 236-32 28-64 52-64 52z"
/>

<rect
id="heartFill"
x="0"
y="512"
width="512"
height="0"
fill="#ff1493"
clip-path="url(#heartClip)"
></rect>

<text
id="percentText"
x="256"
y="250"
text-anchor="middle"
>
0%
</text>

</svg>

</div>

<div class="slideshow">

<img
id="memoryImage"
src=""
class="memoryImage">

</div>
    
</div>

<div id="messageSection" class="hidden">

<div class="card fade-in" id="card">

<img id="gif" class="gif">

<div id="messageText" class="message"></div>

<button class="nextBtn" id="nextBtn">
    Lanjutkan
</button>

</div>

</div>

</div>
    
<audio id="loveMusic" loop>
    <source src="audio/love-theme.mp3" type="audio/mpeg">
</audio>

<audio id="birthdayMusic" loop>
    <source src="audio/happy-birthday.mp3" type="audio/mpeg">
</audio>

<script>

const umur = 18;

const messages = [

"Hai ganteng 🤍",

"today is my boyfriend's birthday, he turns 18! ✨",

"Terima kasih sudah hadir di hidup aku 🥰",

"Aku bersyukur bisa kenal kamu 🌷",

"Semoga semua impian kamu tercapai 💕",

"Semoga selalu sehat dan bahagia 🤍",

"Happy birthday my dear 🤍",

];

const gifs = [

"https://media.giphy.com/media/jst0dxUybUkdH9yTyB/giphy.gif",

"https://media.giphy.com/media/JCSr1AN4mNgLKAy3a0/giphy.gif",

"https://media.giphy.com/media/754u3UNlbbc2tMg97K/giphy.gif",

"https://media.giphy.com/media/wYzNWKJ2jU4rNX6SAO/giphy.gif",

"https://media.giphy.com/media/XlZGsZ8jflqn21UhZG/giphy.gif"

];
    
const memories = [

"img/chat1.jpg",
"img/chat4.jpg",
"img/chat1.jpg",
"img/chat4.jpg"

];

let percent = 0;

const heartTap = document.getElementById("heartTap");
const heartFill = document.getElementById("heartFill");
const percentText = document.getElementById("percentText");

heartTap.addEventListener("click",()=>{

if(percent>=100) return;

percent++;

percentText.textContent=percent+"%";

heartFill.setAttribute(
"y",
512-(percent*5.12)
);

heartFill.setAttribute(
"height",
percent*5.12
);

createHeart();

if(percent===100){

setTimeout(startMessages,800);

}

});

let musicStarted = false;

heartTap.addEventListener("click", () => {

    if (!musicStarted) {
        musicStarted = true;
        document.getElementById("loveMusic").play();
    }

});
    

let memoryIndex = 0;

const memoryImage =
document.getElementById("memoryImage");

memoryImage.src = memories[0];

setInterval(()=>{

    memoryIndex++;

    if(memoryIndex >= memories.length){
        memoryIndex = 0;
    }

    memoryImage.src =
    memories[memoryIndex];

},3000);

function startMessages(){

    document.getElementById("loveMusic").pause();

    const birthdayMusic =
    document.getElementById("birthdayMusic");

    birthdayMusic.currentTime = 0;
    birthdayMusic.play();

    document.getElementById("loveSection")
    .classList.add("hidden");

    document.getElementById("messageSection")
    .classList.remove("hidden");

    showMessage();

}
    
async function typeWriter(element,text){

    element.innerHTML="";

    for(let i=0;i<text.length;i++){

        element.innerHTML += text[i];

        await new Promise(resolve=>
            setTimeout(resolve,40)
        );

    }

}

let current = 0;

async function showMessage(){

    const card = document.getElementById("card");
    const gif = document.getElementById("gif");
    const text = document.getElementById("messageText");
    const nextBtn = document.getElementById("nextBtn");

    nextBtn.disabled = true;

    card.classList.add("fade-out");

    setTimeout(async()=>{

        gif.src = gifs[current % gifs.length];

        text.innerHTML = "";

        card.classList.remove("fade-out");

        await typeWriter(
            text,
            messages[current]
        );

        nextBtn.disabled = false;

    },400);

}
    
document.getElementById("nextBtn")
.addEventListener("click",()=>{

    current++;

    if(current >= messages.length){

        showBirthday();
        return;

    }

    showMessage();

});

function showBirthday(){

document.getElementById("card").innerHTML=`

<div class="finalMessage">
🎉 Selamat Ulang Tahun
Ke ${umur} Tahun Sayanggg 🎂
</div>

<div style="color:white;font-size:18px;">
Scan QR ini kalau kangen aku 💙
</div>

<br>

<img
src="img/MeQrWa.png"
style="
width:220px;
border-radius:20px;
background:white;
padding:10px;
box-shadow:0 0 30px rgba(96,165,250,.8);
">

<div style="
color:white;
font-size:16px;
margin-top:15px;
line-height:1.7;
">

Kalau suatu hari kamu sedih,
kesepian,
atau mau cerita...

aku selalu ada buat kamu 💙

</div>

<br>

<button
id="downloadGift"
class="nextBtn">

🎁 Ambil Hadiah Spesial

</button>

`;

launchConfetti();
launchBalloons();

setTimeout(downloadGift,2000);

const btn =
document.getElementById(
"downloadGift"
);

btn.addEventListener(
"click",
downloadGift
);

}
    
function downloadGift(){

const link =
document.createElement("a");

link.href =
"file/hadiah_spesial.pdf";

link.download =
"hadiah_spesial.pdf";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.bottom="-50px";

heart.style.fontSize=
(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,1200);

function launchConfetti(){

for(let i=0;i<200;i++){

const c=document.createElement("div");

c.className="confetti";

c.innerHTML=
["🎉","🎊","✨","💖"][Math.floor(Math.random()*4)];

c.style.left=Math.random()*100+"%";
c.style.top="-20px";

c.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(c);

}

}

function launchBalloons(){

for(let i=0;i<20;i++){

const b=document.createElement("div");

b.className="balloon";

b.innerHTML=
["🎈","🎈","🎈","🎀"][Math.floor(Math.random()*4)];

b.style.left=Math.random()*100+"%";

b.style.animationDuration=
(8+Math.random()*6)+"s";

document.body.appendChild(b);

}

}

for(let i=0;i<25;i++){

const s=document.createElement("div");

s.className="sparkle";

s.innerHTML="✨";

s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";

s.style.animationDelay=
Math.random()*2+"s";

document.body.appendChild(s);

}

</script>
